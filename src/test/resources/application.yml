  prefix: "Bearer "
  secret: "a2FrYW90ZWNoYm9vdGNhbXBmdWxsc3RhY2sza2FrYW90ZWNoYm9vdGNhbXBmdWxsc3RhY2sz"
  token-expiration-time: 999999
  refresh-expiration-time: 999999